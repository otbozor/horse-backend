services:
  - type: web
    name: otbozor-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npm run build && npx prisma migrate deploy
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: otbozor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 5000
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false

databases:
  - name: otbozor-db
    databaseName: otbozor
    user: otbozor
    plan: free
    region: frankfurt
